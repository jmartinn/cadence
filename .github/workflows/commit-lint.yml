name: commit-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: commit-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  commit-lint:
    name: commit-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validator self-test
        run: sh .githooks/lib/validate-subject.test.sh

      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          sh .githooks/lib/validate-subject.sh "$PR_TITLE"
